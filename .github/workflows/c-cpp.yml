name: C/C++ CI

on:
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:  


jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Update Packages
      run: sudo apt install -y libfl-dev
      
    - name: Build Linux
      run: |
        cd src
        make Linux
        
    - name: Execute Linux Tests
      run: |
        cd src
        make Linux.testonly

    - name: Archive Test Results
      if: ${{ failure() }}
      uses: actions/upload-artifact@v4
      with:
        name: test-failures
        path: |
              test/**/test.result
              test/**/test.out
    - name: Archive Image
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: fsm-linux-image
        path: linux/fsm

  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      kotlin: ${{ steps.filter.outputs.kotlin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            kotlin:
              - 'SPEC.md'
              - '.github/workflows/c-cpp.yml'
              - 'test/kotlin_smoke/**'
              - 'test/full_test144/**'
              - 'src/**'
              - 'include/**'

  kotlin_smoke:
    needs: changes
    if: needs.changes.outputs.kotlin == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install libfl-dev and build fsm
        run: |
          sudo apt install -y libfl-dev
          cd linux
          CFLAGS="-DLINUX -I../src -I." make fsm

      - name: Generate Kotlin for full_test144
        run: |
          cd test/full_test144
          ../../linux/fsm -tk test_fsm.fsm

      - name: Copy generated Kotlin into smoke-test sources
        run: |
          mkdir -p test/kotlin_smoke/src/main/kotlin/io/github/fsmlang/generated/test_fsm
          cp test/full_test144/test_fsm.kt \
             test/kotlin_smoke/src/main/kotlin/io/github/fsmlang/generated/test_fsm/

      - name: Run Kotlin smoke tests
        run: |
          cd test/kotlin_smoke
          ./gradlew test
