name: C/C++ CI

on:
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:  


jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Java (Temurin 17)
      # Required for kotlin_smoke, which is now part of the make Linux.testonly test suite
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
    
    - name: Update Packages
      run: sudo apt install -y libfl-dev
      
    - name: Build Linux
      run: |
        cd src
        make Linux
        
    - name: Execute Linux Tests
      run: |
        cd src
        make Linux.testonly

    - name: Archive Test Results
      if: ${{ failure() }}
      uses: actions/upload-artifact@v4
      with:
        name: test-failures
        path: |
              test/**/test.result
              test/**/test.out
    - name: Archive Image
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: fsm-linux-image
        path: linux/fsm

