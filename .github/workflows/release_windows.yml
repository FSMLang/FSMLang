name: Windows Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to operate on (required for manual run)'
        required: true
        default: ''

permissions:
  contents: write

env:
  REPO: FSMLang/FSMLang

jobs:
  resolve-upload-url:
    name: Resolve release upload_url and tag
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.set.outputs.upload_url }}
      tag: ${{ steps.set.outputs.tag }}
      release_name: ${{ steps.set.outputs.release_name }}
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Determine upload_url and tag
        id: set
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # If triggered manually, use the provided tag and look up the release via API.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            if [ -z "$TAG" ]; then
              echo "Error: workflow_dispatch requires input 'tag'." >&2
              exit 1
            fi
            echo "Looking up release for tag: $TAG"
            respfile=$(mktemp)
            status=$(curl -s -w "%{http_code}" -o "$respfile" -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")
            if [ "$status" -ne 200 ]; then
              echo "ERROR: lookup returned HTTP $status" >&2
              echo "response:" >&2
              cat "$respfile" >&2
              rm -f "$respfile"
              exit 1
            fi
            upload_url=$(jq -r '.upload_url // empty' < "$respfile")
            release_name=$(jq -r '.name // empty' < "$respfile")
            if [ -z "$upload_url" ] || [ "$upload_url" = "null" ]; then
              echo "ERROR: release for tag '$TAG' has no upload_url" >&2
              cat "$respfile" >&2
              rm -f "$respfile"
              exit 1
            fi
            echo "upload_url=$upload_url" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "release_name=$release_name" >> $GITHUB_OUTPUT
            rm -f "$respfile"
          else
            # Triggered by a release event: take values from the event payload
            echo "upload_url=${{ github.event.release.upload_url }}" >> $GITHUB_OUTPUT
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
            echo "release_name=${{ github.event.release.name }}" >> $GITHUB_OUTPUT
          fi

  build-windows:
    name: Build Windows (CMake + MinGW) and upload assets
    runs-on: windows-latest
    needs: resolve-upload-url
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.resolve-upload-url.outputs.tag }}
          fetch-depth: 0

      - name: Install packages (Windows)
        run: choco install winflexbison3 -y --execution-timeout=5400

      - name: Configure (CMake, MinGW)
        run: cmake -B build -G "MinGW Makefiles"

      - name: Build (CMake)
        run: cmake --build build

      - name: Prepare Windows artifact and metadata (PowerShell)
        shell: pwsh
        run: |
          $tag = "${{ needs.resolve-upload-url.outputs.tag }}"
          $releaseName = "${{ needs.resolve-upload-url.outputs.release_name }}"
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Copy-Item -Path build\fsm.exe -Destination "artifacts\fsm-$tag-windows.exe" -Force

          "tag: $tag" | Out-File -Encoding ascii "artifacts\fsm-$tag-windows.meta.txt"
          "release_name: $releaseName" | Out-File -Encoding ascii -Append "artifacts\fsm-$tag-windows.meta.txt"
          "commit: ${{ github.sha }}" | Out-File -Encoding ascii -Append "artifacts\fsm-$tag-windows.meta.txt"
          "runner: ${{ runner.os }}" | Out-File -Encoding ascii -Append "artifacts\fsm-$tag-windows.meta.txt"
          $cmake = (& cmake --version) -split "`n"
          $cmake[0] | Out-File -Encoding ascii -Append "artifacts\fsm-$tag-windows.meta.txt"
          "build_time: $(Get-Date -Format s)Z" | Out-File -Encoding ascii -Append "artifacts\fsm-$tag-windows.meta.txt"
          $size = (Get-Item "artifacts\fsm-$tag-windows.exe").Length
          "file_size_bytes: $size" | Out-File -Encoding ascii -Append "artifacts\fsm-$tag-windows.meta.txt"

          $hash = Get-FileHash -Algorithm SHA256 "artifacts\fsm-$tag-windows.exe"
          "$($hash.Hash)  fsm-$tag-windows.exe" | Out-File -Encoding ascii "artifacts\fsm-$tag-windows.exe.sha256"

          # --- CMake step source package ----------------------
          $pkgName = "fsm-$tag-windows-cmake-src"
          $pkgDir = Join-Path "artifacts" $pkgName

          if (Test-Path $pkgDir) { Remove-Item -Recurse -Force $pkgDir }
          New-Item -ItemType Directory -Path (Join-Path $pkgDir "bin") -Force | Out-Null

          # Include pre-built binary in bin/
          Copy-Item -Path "artifacts\fsm-$tag-windows.exe" -Destination (Join-Path $pkgDir "bin\fsm.exe") -Force

          # Minimal CMake project that installs the bundled binary
          @'
cmake_minimum_required(VERSION 3.15)
project(FSMLangTools LANGUAGES NONE)

option(FSMLANGTOOLS_INSTALL_BINARY "Install the bundled fsm binary" ON)

if(FSMLANGTOOLS_INSTALL_BINARY)
  install(PROGRAMS "${CMAKE_CURRENT_LIST_DIR}/bin/fsm.exe" DESTINATION bin)
endif()
'@ | Out-File -Encoding ascii (Join-Path $pkgDir "CMakeLists.txt")

          @'
# FSMLang (CMake step package)

This archive is intended to be consumed from CMake as a simple step/package.

## Using FetchContent (example)

```cmake
include(FetchContent)

FetchContent_Declare(
  fsmlang_tools
  URL https://github.com/FSMLang/FSMLang/releases/download/<TAG>/fsm-<TAG>-windows-cmake-src.tar.gz
)
FetchContent_MakeAvailable(fsmlang_tools)

add_subdirectory(${fsmlang_tools_SOURCE_DIR} fsmlang_tools)
```

Then run:
- `cmake --build .`
- `cmake --install .`

'@ | Out-File -Encoding ascii (Join-Path $pkgDir "README.cmake.md")

          # Create .tar.gz (requires tar.exe, available on windows-latest)
          $tgzPath = "artifacts\${pkgName}.tar.gz"
          if (Test-Path $tgzPath) { Remove-Item -Force $tgzPath }
          tar -C artifacts -czf $tgzPath $pkgName

          # sha256 for the archive
          $tgzHash = Get-FileHash -Algorithm SHA256 $tgzPath
          "$($tgzHash.Hash)  ${pkgName}.tar.gz" | Out-File -Encoding ascii "artifacts\${pkgName}.tar.gz.sha256"
          # --- end CMake step source package -------------------

      - name: Upload Exe
        uses: actions/upload-artifact@v4
        with:
          name: fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows.exe
          path: artifacts/fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows.exe

      - name: Upload Checksum
        uses: actions/upload-artifact@v4
        with:
          name: fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows.meta.txt
          path: artifacts/fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows.meta.txt

      - name: Upload Metadata
        uses: actions/upload-artifact@v4
        with:
          name: fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows.exe.sha256
          path: artifacts/fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows.exe.sha256

      - name: Upload CMake step source package (tar.gz)
        uses: actions/upload-artifact@v4
        with:
          name: fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows-cmake-src.tar.gz
          path: artifacts/fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows-cmake-src.tar.gz

      - name: Upload CMake step source package checksum (tar.gz.sha256)
        uses: actions/upload-artifact@v4
        with:
          name: fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows-cmake-src.tar.gz.sha256
          path: artifacts/fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows-cmake-src.tar.gz.sha256

  sign-and-publish:
    name: Sign Windows Artificts and Upload to Release
    runs-on: ubuntu-latest
    needs: [resolve-upload-url, build-windows]
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check if signing is enabled (Windows)
        id: check_signing
        shell: pwsh
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if ($env:GPG_PRIVATE_KEY) { "sign=true" >> $env:GITHUB_OUTPUT } else { "sign=false" >> $env:GITHUB_OUTPUT }

      - name: Install GnuPG (only if signing)
        if: ${{ steps.check_signing.outputs.sign == 'true' }}
        run: sudo apt-get update && sudo apt-get install -y gnupg

      - name: Import GPG private key (Linux) (only if signing)
        if: ${{ steps.check_signing.outputs.sign == 'true' }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -e
          # Try raw ASCII-armored first (normalize CRLF), validate with gpg --list-packets
          printf '%s\n' "$GPG_PRIVATE_KEY" | sed 's/\r$//' > private.key.raw
          if gpg --list-packets private.key.raw >/dev/null 2>&1; then
            mv private.key.raw private.key
          else
            rm -f private.key.raw
            # Try base64 decode
            if printf '%s' "$GPG_PRIVATE_KEY" | base64 --decode > private.key.b64 2>/dev/null; then
              if gpg --list-packets private.key.b64 >/dev/null 2>&1; then
                mv private.key.b64 private.key
              else
                rm -f private.key.b64
                echo "ERROR: decoded secret is not valid OpenPGP data. Ensure the secret contains a valid base64-encoded private key or an ASCII-armored private key." >&2
                exit 2
              fi
            else
              echo "ERROR: secret is neither valid ASCII-armored OpenPGP data nor valid base64-encoded data." >&2
              exit 2
            fi
          fi

          # Import the validated private.key and clean up
          gpg --batch --import private.key
          rm -f private.key

      - name: Download Exe
        uses: actions/download-artifact@v4
        with:
          name: fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows.exe
          path: artifacts/

      - name: Download Checksum
        uses: actions/download-artifact@v4
        with:
          name: fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows.meta.txt
          path: artifacts/

      - name: Download Metadata
        uses: actions/download-artifact@v4
        with:
          name: fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows.exe.sha256
          path: artifacts/

      - name: Download Windows CMake step source package (tar.gz)
        uses: actions/download-artifact@v4
        with:
          name: fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows-cmake-src.tar.gz
          path: artifacts/

      - name: Download Windows CMake step source package checksum (sha256)
        uses: actions/download-artifact@v4
        with:
          name: fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows-cmake-src.tar.gz.sha256
          path: artifacts/

      - name: Create GPG detached signatures for Linux artifacts (only if signing)
        if: ${{ steps.check_signing.outputs.sign == 'true' }}
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          TAG="${{ needs.resolve-upload-url.outputs.tag }}"
          for f in "artifacts/fsm-${TAG}-windows.exe" \
                   "artifacts/fsm-${TAG}-windows.exe.sha256" \
                   "artifacts/fsm-${TAG}-windows.meta.txt" \
                   "artifacts/fsm-${TAG}-windows-cmake-src.tar.gz" \
                   "artifacts/fsm-${TAG}-windows-cmake-src.tar.gz.sha256" \
          ; do
            gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --detach-sign -a "$f"
          done

      - name: Install jq (for deletion step)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Delete existing Windows release assets (if present)
        run: |
          TAG="${{ needs.resolve-upload-url.outputs.tag }}"
          echo "Checking release assets for tag $TAG"
          resp=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")
          for NAME in \
            "fsm-${TAG}-windows.exe" \
            "fsm-${TAG}-windows.exe.sha256" \
            "fsm-${TAG}-windows.meta.txt" \
            "fsm-${TAG}-windows-cmake-src.tar.gz" \
            "fsm-${TAG}-windows-cmake-src.tar.gz.sha256" \
            "fsm-${TAG}-windows.exe.asc" \
            "fsm-${TAG}-windows.exe.sha256.asc" \
            "fsm-${TAG}-windows.meta.txt.asc" \
            "fsm-${TAG}-windows-cmake-src.tar.gz.asc" \
            "fsm-${TAG}-windows-cmake-src.tar.gz.sha256.asc" \
          ; do
            asset_id=$(printf '%s' "$resp" | jq -r --arg NAME "$NAME" '.assets[] | select(.name==$NAME) .id // empty')
            if [ -n "$asset_id" ]; then
              echo "Deleting existing asset $NAME (id $asset_id)"
              curl -s -X DELETE -H "Authorization: Bearer $GITHUB_TOKEN" "https://api.github.com/repos/${{ github.repository }}/releases/assets/$asset_id"
            else
              echo "No existing asset named $NAME"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows binary to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ needs.resolve-upload-url.outputs.upload_url }}
          asset_path: "artifacts/fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows.exe"
          asset_name: "fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows.exe"
          asset_content_type: application/octet-stream

      - name: Upload Windows checksum to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ needs.resolve-upload-url.outputs.upload_url }}
          asset_path: "artifacts/fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows.exe.sha256"
          asset_name: "fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows.exe.sha256"
          asset_content_type: text/plain

      - name: Upload Windows metadata to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ needs.resolve-upload-url.outputs.upload_url }}
          asset_path: "artifacts/fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows.meta.txt"
          asset_name: "fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows.meta.txt"
          asset_content_type: text/plain

      - name: Upload Windows CMake step source package to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ needs.resolve-upload-url.outputs.upload_url }}
          asset_path: "artifacts/fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows-cmake-src.tar.gz"
          asset_name: "fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows-cmake-src.tar.gz"
          asset_content_type: application/gzip

      - name: Upload Windows CMake step source package checksum to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ needs.resolve-upload-url.outputs.upload_url }}
          asset_path: "artifacts/fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows-cmake-src.tar.gz.sha256"
          asset_name: "fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows-cmake-src.tar.gz.sha256"
          asset_content_type: text/plain

      - name: Upload Windows signature to Release (only if signing)
        if: ${{ steps.check_signing.outputs.sign == 'true' }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ needs.resolve-upload-url.outputs.upload_url }}
          asset_path: "artifacts/fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows.meta.txt.asc"
          asset_name: "fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows.meta.txt.asc"
          asset_content_type: text/plain

      - name: Upload Windows binary signature to Release (only if signing)
        if: ${{ steps.check_signing.outputs.sign == 'true' }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ needs.resolve-upload-url.outputs.upload_url }}
          asset_path: "artifacts/fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows.exe.asc"
          asset_name: "fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows.exe.asc"
          asset_content_type: text/plain

      - name: Upload Windows CMake step source package signature (only if signing) to Release
        if: ${{ steps.check_signing.outputs.sign == 'true' }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ needs.resolve-upload-url.outputs.upload_url }}
          asset_path: "artifacts/fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows-cmake-src.tar.gz.asc"
          asset_name: "fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows-cmake-src.tar.gz.asc"
          asset_content_type: text/plain

      - name: Upload Windows CMake step source package checksum signature (only if signing) to Release
        if: ${{ steps.check_signing.outputs.sign == 'true' }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ needs.resolve-upload-url.outputs.upload_url }}
          asset_path: "artifacts/fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows-cmake-src.tar.gz.sha256.asc"
          asset_name: "fsm-${{ needs.resolve-upload-url.outputs.tag }}-windows-cmake-src.tar.gz.sha256.asc"
          asset_content_type: text/plain

  generate-rst-and-publish:
    name: Produce ReStructuredText release index, upload to Release, and publish to gh-pages
    needs: [resolve-upload-url, sign-and-publish]
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create RST document
        run: |
          mkdir -p artifacts
          TAG="${{ needs.resolve-upload-url.outputs.tag }}"
          REPO="${{ env.REPO }}"
          RELEASE_NAME="${{ needs.resolve-upload-url.outputs.release_name }}"
          COMMIT="${{ github.sha }}"
          BUILD_TIME="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          RST_FILE="artifacts/release-${TAG}-windows.rst"

          cat > "${RST_FILE}" <<EOF
          Release ${TAG} (Windows)
          ================================================================
          
          Release name: ${RELEASE_NAME}
          Tag: ${TAG}
          Commit: ${COMMIT}
          Build time (UTC): ${BUILD_TIME}
          
          Assets
          ------
          
          - Windows binary: fsm-${TAG}-windows.exe
          - Windows checksum: fsm-${TAG}-windows.exe.sha256
          - Windows metadata: fsm-${TAG}-windows.meta.txt
          - Windows CMake step source package: fsm-${TAG}-windows-cmake-src.tar.gz
          - Windows CMake step source package checksum: fsm-${TAG}-windows-cmake-src.tar.gz.sha256
          - Windows signature (optional): fsm-${TAG}-windows.exe.asc
          - Windows checksum signature (optional): fsm-${TAG}-windows.exe.sha256.asc
          - Windows metadata signature (optional): fsm-${TAG}-windows.meta.txt.asc
          - Windows CMake step source package signature (optional): fsm-${TAG}-windows-cmake-src.tar.gz
          - Windows CMake step source package checksum signature (optional): fsm-${TAG}-windows-cmake-src.tar.gz.sha256
          
          Download URLs (GitHub release assets)
          -------------------------------------
          
          - Windows binary: https://github.com/${REPO}/releases/download/${TAG}/fsm-${TAG}-windows.exe
          - Windows checksum: https://github.com/${REPO}/releases/download/${TAG}/fsm-${TAG}-windows.exe.sha256
          - Windows metadata: https://github.com/${REPO}/releases/download/${TAG}/fsm-${TAG}-windows.meta.txt
          - Windows CMake step source package: https://github.com/${REPO}/releases/download/${TAG}/fsm-${TAG}-windows-cmake-src.tar.gz
          - Windows CMake step source package checksum: https://github.com/${REPO}/releases/download/${TAG}/fsm-${TAG}-windows-cmake-src.tar.gz.sha256
          - Windows binary signature (optional): https://github.com/${REPO}/releases/download/${TAG}/fsm-${TAG}-windows.exe.asc
          - Windows checksum signature (optional): https://github.com/${REPO}/releases/download/${TAG}/fsm-${TAG}-windows.exe.sha256.asc
          - Windows metadata signature (optional): https://github.com/${REPO}/releases/download/${TAG}/fsm-${TAG}-windows.meta.txt.asc
          - Windows CMake step source package signature (optional): https://github.com/${REPO}/releases/download/${TAG}/fsm-${TAG}-windows-cmake-src.tar.gz.asc
          - Windows CMake step source package checksum signature (optional): https://github.com/${REPO}/releases/download/${TAG}/fsm-${TAG}-windows-cmake-src.tar.gz.sha256.asc
          
          EOF

      - name: Deploy release RST to FSMLang.github.io master/Artifacts
        env:
          PAGES_REPO: FSMLang/FSMLang.github.io
          PAGES_BRANCH: master
          PAGES_TOKEN: ${{ secrets.PAGES_REPO_TOKEN }}
          TAG: ${{ needs.resolve-upload-url.outputs.tag }}
        run: |
          # This step commits only the generated release-<TAG>-windows.rst into the Artifacts/ folder
          # on the FSMLang/FSMLang.github.io repository master branch.
          # Ensure you have created a secret PAGES_REPO_TOKEN with a token that has write access
          set -e

          echo "Cloning target repo ${PAGES_REPO} (branch ${PAGES_BRANCH})"
          git clone --depth=1 --branch "${PAGES_BRANCH}" "https://x-access-token:${PAGES_TOKEN}@github.com/${PAGES_REPO}.git" site || {
            # If branch doesn't exist, clone default and create the branch
            git clone "https://x-access-token:${PAGES_TOKEN}@github.com/${PAGES_REPO}.git" site
            pushd site
            git checkout -b "${PAGES_BRANCH}"
            popd
          }

          # Ensure Artifacts folder exists and copy only the RST file
          mkdir -p site/Artifacts
          cp "artifacts/release-${TAG}-windows.rst" "site/Artifacts/"

          pushd site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # add and commit only the Artifacts/release-*.rst file
          git add "Artifacts/release-${TAG}-windows.rst"
          if git diff --cached --quiet; then
            echo "No changes to commit for Artifacts/release-${TAG}-windows.rst"
          else
            git commit -m "Publish release ${TAG} RST to Artifacts/"
            echo "Pushing changes to ${PAGES_REPO}:${PAGES_BRANCH}"
            git push "https://x-access-token:${PAGES_TOKEN}@github.com/${PAGES_REPO}.git" "HEAD:${PAGES_BRANCH}"
          fi
          popd

